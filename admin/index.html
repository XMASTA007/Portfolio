<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin | JB Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous">
  <link rel="stylesheet" href="admin.css">
</head>
<body>

<!-- ═══════════════════════════════
     LOGIN SCREEN
═══════════════════════════════ -->
<div id="login-screen" class="login-wrap">
  <div class="login-card">
    <div class="login-logo">
      <i class="fas fa-shield-halved"></i>
    </div>
    <h1 class="login-title">Admin Panel</h1>
    <p class="login-sub">Jonathan Beukes Portfolio</p>
    <form id="login-form" novalidate>
      <div class="field-wrap">
        <label class="field-label">Password</label>
        <div class="pw-wrap">
          <input type="password" id="pw-input" class="field-input" placeholder="Enter admin password" autocomplete="current-password">
          <button type="button" id="pw-toggle" class="pw-eye" tabindex="-1" aria-label="Show password">
            <i class="fas fa-eye"></i>
          </button>
        </div>
      </div>
      <div id="login-error" class="alert-error hidden"></div>
      <button type="submit" class="btn-full" id="login-btn">
        <span class="btn-label">Sign In</span>
        <i class="fas fa-arrow-right"></i>
      </button>
    </form>
  </div>
</div>

<!-- ═══════════════════════════════
     DASHBOARD
═══════════════════════════════ -->
<div id="dashboard" class="hidden">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sb-top">
      <div class="sb-brand">
        <i class="fas fa-code sb-logo-icon"></i>
        <span class="sb-brand-name">JB Admin</span>
      </div>
    </div>
    <nav class="sb-nav">
      <button class="sb-item active" data-tab="about">
        <i class="fas fa-user"></i><span>About</span>
      </button>
      <button class="sb-item" data-tab="skills">
        <i class="fas fa-layer-group"></i><span>Skills</span>
      </button>
      <button class="sb-item" data-tab="experience">
        <i class="fas fa-briefcase"></i><span>Experience</span>
      </button>
      <button class="sb-item" data-tab="projects">
        <i class="fas fa-folder-open"></i><span>Projects</span>
      </button>
      <button class="sb-item" data-tab="contact">
        <i class="fas fa-at"></i><span>Contact</span>
      </button>
      <button class="sb-item" data-tab="settings">
        <i class="fas fa-gear"></i><span>Settings</span>
      </button>
    </nav>
    <div class="sb-bottom">
      <a href="/" target="_blank" class="sb-preview">
        <i class="fas fa-arrow-up-right-from-square"></i><span>Preview Site</span>
      </a>
      <button class="sb-logout" id="logout-btn">
        <i class="fas fa-right-from-bracket"></i><span>Logout</span>
      </button>
    </div>
  </aside>

  <!-- Main content -->
  <div class="dash-main">
    <!-- Header -->
    <header class="dash-header">
      <button class="hamburger" id="sidebar-toggle" aria-label="Toggle sidebar">
        <i class="fas fa-bars"></i>
      </button>
      <h2 class="dash-title" id="tab-title">About Me</h2>
      <div class="dash-actions">
        <div id="save-status" class="save-status hidden"></div>
        <button class="btn-save" id="save-btn">
          <i class="fas fa-floppy-disk"></i> Save Changes
        </button>
      </div>
    </header>

    <!-- Tab: ABOUT -->
    <section class="tab-pane active" id="tab-about">
      <div class="form-grid">
        <div class="field-group">
          <label class="field-label">Display Name</label>
          <input type="text" class="field-input" id="about-name" placeholder="Jonathan Beukes">
        </div>
        <div class="field-group">
          <label class="field-label">Location</label>
          <input type="text" class="field-input" id="about-location" placeholder="South Africa">
        </div>
        <div class="field-group span-2">
          <label class="field-label">Current Role / Title</label>
          <input type="text" class="field-input" id="about-role" placeholder="L1 Server Support @ NTT">
        </div>
        <div class="field-group span-2">
          <label class="field-label">Bio — Paragraph 1</label>
          <textarea class="field-input field-ta" id="about-bio0" rows="3" placeholder="Introduce yourself..."></textarea>
        </div>
        <div class="field-group span-2">
          <label class="field-label">Bio — Paragraph 2</label>
          <textarea class="field-input field-ta" id="about-bio1" rows="3" placeholder="Your current role or focus..."></textarea>
        </div>
        <div class="field-group span-2">
          <label class="field-label">Bio — Paragraph 3</label>
          <textarea class="field-input field-ta" id="about-bio2" rows="3" placeholder="Hobbies / personal touch..."></textarea>
        </div>
        <div class="field-group span-2">
          <label class="field-label">Open to Work</label>
          <label class="toggle-label">
            <input type="checkbox" id="about-open" class="toggle-cb">
            <span class="toggle-track"><span class="toggle-thumb"></span></span>
            <span class="toggle-text" id="open-text">Yes</span>
          </label>
        </div>
      </div>
    </section>

    <!-- Tab: SKILLS -->
    <section class="tab-pane hidden" id="tab-skills">
      <div id="skills-editor"></div>
      <button class="btn-add" id="add-skill">
        <i class="fas fa-plus"></i> Add Skill Category
      </button>
    </section>

    <!-- Tab: EXPERIENCE -->
    <section class="tab-pane hidden" id="tab-experience">
      <div id="experience-editor"></div>
      <button class="btn-add" id="add-exp">
        <i class="fas fa-plus"></i> Add Entry
      </button>
    </section>

    <!-- Tab: PROJECTS -->
    <section class="tab-pane hidden" id="tab-projects">
      <div id="projects-editor"></div>
      <button class="btn-add" id="add-proj">
        <i class="fas fa-plus"></i> Add Project
      </button>
    </section>

    <!-- Tab: CONTACT -->
    <section class="tab-pane hidden" id="tab-contact">
      <div class="form-grid">
        <div class="field-group span-2">
          <label class="field-label">Email Address</label>
          <input type="email" class="field-input" id="ct-email" placeholder="you@example.com">
        </div>
        <div class="field-group">
          <label class="field-label">GitHub URL</label>
          <input type="url" class="field-input" id="ct-github" placeholder="https://github.com/username">
        </div>
        <div class="field-group">
          <label class="field-label">LinkedIn URL</label>
          <input type="url" class="field-input" id="ct-linkedin" placeholder="https://linkedin.com/in/username">
        </div>
        <div class="field-group">
          <label class="field-label">Instagram URL</label>
          <input type="url" class="field-input" id="ct-instagram" placeholder="https://instagram.com/username">
        </div>
        <div class="field-group">
          <label class="field-label">Twitter / X URL</label>
          <input type="url" class="field-input" id="ct-twitter" placeholder="https://twitter.com/username">
        </div>
        <div class="field-group span-2">
          <label class="field-label">Facebook URL</label>
          <input type="url" class="field-input" id="ct-facebook" placeholder="https://facebook.com/username">
        </div>
      </div>
    </section>

    <!-- Tab: SETTINGS -->
    <section class="tab-pane hidden" id="tab-settings">
      <div class="settings-section">
        <h3 class="settings-heading">Change Password</h3>
        <p class="settings-note">Leave blank to keep your current password.</p>
        <div class="form-grid">
          <div class="field-group">
            <label class="field-label">New Password</label>
            <div class="pw-wrap">
              <input type="password" id="new-pw" class="field-input" placeholder="Min. 8 characters">
              <button type="button" class="pw-eye" onclick="togglePw('new-pw', this)"><i class="fas fa-eye"></i></button>
            </div>
          </div>
          <div class="field-group">
            <label class="field-label">Confirm Password</label>
            <div class="pw-wrap">
              <input type="password" id="confirm-pw" class="field-input" placeholder="Repeat new password">
              <button type="button" class="pw-eye" onclick="togglePw('confirm-pw', this)"><i class="fas fa-eye"></i></button>
            </div>
          </div>
        </div>
        <div id="pw-error" class="alert-error hidden"></div>
        <button class="btn-primary-sm" id="change-pw-btn">
          <i class="fas fa-key"></i> Update Password
        </button>
      </div>

      <div class="settings-section mt-4">
        <h3 class="settings-heading">Theme</h3>
        <div class="theme-switcher">
          <button class="theme-opt active" id="theme-dark" onclick="setAdminTheme('dark')">
            <i class="fas fa-moon"></i> Dark
          </button>
          <button class="theme-opt" id="theme-light" onclick="setAdminTheme('light')">
            <i class="fas fa-sun"></i> Light
          </button>
        </div>
      </div>
    </section>

  </div><!-- /dash-main -->
</div><!-- /dashboard -->

<div id="toast" class="toast hidden"></div>

<script src="admin.js"></script>
</body>
</html>
